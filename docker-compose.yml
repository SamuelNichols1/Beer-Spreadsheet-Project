services:
  backend:
    build:
      context: ./Beer_Spreadsheet
      dockerfile: Dockerfile.prod
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECURE_COOKIES: "True"
      DJANGO_DB_PATH: /app/db.sqlite3
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-ratings.beer,www.ratings.beer,localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-https://ratings.beer:8008,https://www.ratings.beer:8008}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-https://ratings.beer:8008,https://www.ratings.beer:8008}
    volumes:
      - ./Beer_Spreadsheet/db.sqlite3:/app/db.sqlite3
    restart: unless-stopped

  frontend:
    build:
      context: ./Beer_Spreadsheet_Frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    depends_on:
      - frontend
      - backend
    env_file:
      - .env
    ports:
      - "80:80"
      - "8008:8008"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
