services:
  backend:
    build: ./Beer_Spreadsheet
    ports:
      - "8000:8000"
    volumes:
      - ./Beer_Spreadsheet:/app
      - ./logs:/logs
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,host.docker.internal,193.46.21.141}
      - DJANGO_CORS_ALLOWED_ORIGINS=${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:80,http://127.0.0.1:80, http://193.46.21.141:80}
      - DJANGO_CSRF_TRUSTED_ORIGINS=${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:80,http://127.0.0.1:80, http://193.46.21.141:80}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/csrf/')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  frontend:
    build: ./Beer_Spreadsheet_Frontend
    ports:
      - "80:5173"
    volumes:
      - ./Beer_Spreadsheet_Frontend:/app
      - /app/node_modules
    environment:
      - BACKEND_URL=http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy
