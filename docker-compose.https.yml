services:
  backend_prod:
    build: ./Beer_Spreadsheet
    expose:
      - "8000"
    volumes:
      - ./Beer_Spreadsheet/db.sqlite3:/app/db.sqlite3
      - ./logs:/logs
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend_prod}
      - DJANGO_CORS_ALLOWED_ORIGINS=${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      - DJANGO_CSRF_TRUSTED_ORIGINS=${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1}

  proxy:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    expose:
      - "80"
    depends_on:
      - backend_prod

  caddy:
    image: caddy:2.9-alpine
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - proxy

volumes:
  caddy_data:
  caddy_config:
